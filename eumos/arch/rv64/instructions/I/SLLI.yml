name: SLLI
mnemonic: slli
format: I
asm_format: default
fixed_values:
  opcode: 0x13
  funct3: 0x1
  funct7: 0x00
inputs:
  - rd
  - rs1
  - imm
operand_aliases:
  imm:
    - shamt
immediate_encoding:
  imm:
    mode: shift
    width: 6
    prefix: 0x000
extension: "I"
groups:
  - alu
description: |
  SLLI performs a logical left shift of rs1 by the amount in imm[5:0] and stores the result in rd.
  rd = rs1 << imm[5:0]
